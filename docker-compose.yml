services:
  web:
    build:
      context: .
    image: np-site:production
    restart: unless-stopped
    stop_grace_period: 45s
    init: true
    env_file:
      - .env
    environment:
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
      DJANGO_COLLECTSTATIC: "1"
      DJANGO_MIGRATE: "1"
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${WEB_MEMORY_LIMIT:-512m}
    cpus: ${WEB_CPU_LIMIT:-1.0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ${NP_SITE_ROOT:-/srv/np-site}/data:/app/data
      - ${NP_SITE_ROOT:-/srv/np-site}/media:/app/media
      - ${NP_SITE_ROOT:-/srv/np-site}/staticfiles:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; host=(os.environ.get('DJANGO_HEALTHCHECK_HOST') or os.environ.get('DJANGO_ALLOWED_HOSTS','localhost').split(',')[0].strip() or 'localhost'); req=urllib.request.Request('http://127.0.0.1:8000/health/', headers={'Host': host, 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--worker-class",
        "gthread",
        "--workers",
        "${GUNICORN_WORKERS:-2}",
        "--threads",
        "${GUNICORN_THREADS:-2}",
        "--timeout",
        "60",
        "--graceful-timeout",
        "30",
        "--keep-alive",
        "5",
        "--max-requests",
        "1000",
        "--max-requests-jitter",
        "100",
        "--worker-tmp-dir",
        "/tmp",
        "--no-control-socket",
        "--error-logfile",
        "-",
      ]

  nginx:
    image: nginx:1.31.2-alpine
    restart: unless-stopped
    stop_grace_period: 15s
    init: true
    depends_on:
      web:
        condition: service_healthy
    environment:
      NGINX_SERVER_NAME: ${PRIMARY_DOMAIN:?set PRIMARY_DOMAIN in .env} ${WWW_DOMAIN:-}
      NGINX_SSL_CERTIFICATE: /etc/letsencrypt/live/${CERTBOT_CERTIFICATE_NAME:-${PRIMARY_DOMAIN:?set PRIMARY_DOMAIN in .env}}/fullchain.pem
      NGINX_SSL_CERTIFICATE_KEY: /etc/letsencrypt/live/${CERTBOT_CERTIFICATE_NAME:-${PRIMARY_DOMAIN:?set PRIMARY_DOMAIN in .env}}/privkey.pem
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-300m}
    ports:
      - "80:80"
      - "443:443"
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:rw,noexec,nosuid,nodev,size=2m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=32m
      - /var/run:rw,noexec,nosuid,nodev,size=2m
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    pids_limit: 128
    mem_limit: ${NGINX_MEMORY_LIMIT:-256m}
    cpus: ${NGINX_CPU_LIMIT:-0.5}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./deploy/nginx/templates/${NGINX_TEMPLATE:-production.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - ${NP_SITE_ROOT:-/srv/np-site}/staticfiles:/srv/compiled-static:ro
      - ${NP_SITE_ROOT:-/srv/np-site}/media:/srv/protected-media:ro
      - ${NP_SITE_ROOT:-/srv/np-site}/certbot/www:/var/www/certbot:ro
      - ${NP_SITE_ROOT:-/srv/np-site}/letsencrypt:/etc/letsencrypt:ro
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health | grep -q '^ok$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:v5.7.0
    restart: unless-stopped
    stop_grace_period: 15s
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
      - /var/lib/letsencrypt:rw,noexec,nosuid,nodev,size=16m
      - /var/log/letsencrypt:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:?set PRIMARY_DOMAIN in .env}
      WWW_DOMAIN: ${WWW_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?set CERTBOT_EMAIL in .env}
      CERTBOT_CERTIFICATE_NAME: ${CERTBOT_CERTIFICATE_NAME:-${PRIMARY_DOMAIN:?set PRIMARY_DOMAIN in .env}}
    volumes:
      - ${NP_SITE_ROOT:-/srv/np-site}/certbot/www:/var/www/certbot
      - ${NP_SITE_ROOT:-/srv/np-site}/letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c 'trap exit TERM; while :; do certbot renew
      --webroot --webroot-path /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done'
    pids_limit: 64
    mem_limit: ${CERTBOT_MEMORY_LIMIT:-256m}
    cpus: ${CERTBOT_CPU_LIMIT:-0.5}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - certbot

networks:
  backend:
    name: np-site-backend
    internal: true

  frontend:
    name: np-site-frontend

  certbot:
    name: np-site-certbot
